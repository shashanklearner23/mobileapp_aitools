<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI Toolkit – Student Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117; --card: #181c26; --input: #1e2333; --border: #2a3050;
      --accent: #f5c518; --text: #f0f2f8; --muted: #7a859e; --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; }
    .app-wrapper { width: 100%; max-width: 430px; padding: 30px 20px; }
    
    .screen { display: none; animation: fadeUp 0.4s ease; }
    .screen.active { display: flex; flex-direction: column; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    /* UI Components */
    .screen-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; margin-bottom: 8px; }
    .screen-header p { color: var(--muted); font-size: 14px; margin-bottom: 25px; }
    
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    input { width: 100%; background: var(--input); border: 1.5px solid var(--border); border-radius: 10px; color: #fff; padding: 12px; outline: none; }
    
    .cta-btn { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: var(--radius); font-weight: 800; cursor: pointer; margin-top: 10px; }
    
    /* Dashboard Specific */
    .dash-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); margin-bottom: 15px; }
    .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
    .tool-item { background: var(--input); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid transparent; transition: 0.2s; cursor: pointer; }
    .tool-item:hover { border-color: var(--accent); }
  </style>
</head>
<body>

<div class="app-wrapper">
  
  <div class="screen active" id="signUpScreen">
    <div class="screen-header">
      <h1>Create Account</h1>
      <p>Join the AI Toolkit Student Registry</p>
    </div>
    <div class="form-group"><label>Full Name</label><input type="text" id="su-name" placeholder="John Doe"></div>
    <div class="form-group"><label>Email</label><input type="email" id="su-email" placeholder="john@university.edu"></div>
    <div class="form-group"><label>Institution</label><input type="text" id="su-inst" placeholder="Harvard / IIT"></div>
    <button class="cta-btn" onclick="registerUser()">Access Dashboard →</button>
  </div>

  <div class="screen" id="dashScreen">
    <div class="screen-header">
      <p>Welcome back,</p>
      <h1 id="userHello">Student</h1>
    </div>

    <div class="dash-card">
      <h3 style="font-size:14px; margin-bottom:10px;">Cloud Sync Status</h3>
      <p style="font-size:12px; color:var(--muted); margin-bottom:15px;">Your details are stored locally. Sync to secure them in the Google Sheet database.</p>
      <button onclick="syncToCloud()" style="background:transparent; border:1px solid var(--accent); color:var(--accent); padding:10px; border-radius:8px; width:100%; cursor:pointer; font-weight:700;">
        ☁️ Sync to Google Sheets
      </button>
    </div>

    <div class="tool-grid">
      <div class="tool-item"><span>🤖</span><div style="font-size:12px; margin-top:5px;">AI Chat</div></div>
      <div class="tool-item"><span>📝</span><div style="font-size:12px; margin-top:5px;">Resume Lab</div></div>
      <div class="tool-item"><span>📊</span><div style="font-size:12px; margin-top:5px;">Study Plan</div></div>
      <div class="tool-item"><span>🔒</span><div style="font-size:12px; margin-top:5px;">Vault</div></div>
    </div>
  </div>

</div>

<script>
  // CHANGE THIS to your deployed Google Apps Script URL
  const GAS_URL = "https://script.google.com/macros/s/YOUR_DEPLOYED_ID_HERE/exec";

  function registerUser() {
    const user = {
      name: document.getElementById('su-name').value,
      email: document.getElementById('su-email').value,
      institution: document.getElementById('su-inst').value
    };
    localStorage.setItem('currentUser', JSON.stringify(user));
    
    document.getElementById('signUpScreen').classList.remove('active');
    document.getElementById('dashScreen').classList.add('active');
    document.getElementById('userHello').innerText = user.name.split(' ')[0];
  }

  function syncToCloud() {
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if(!user) return alert("Please sign in first");

    // Create the JSONP Request
    const script = document.createElement('script');
    const callbackName = 'gsheetCallback';
    
    const params = {
      function: "syncStudentProfile",
      args: JSON.stringify([user.email, {name: user.name, institution: user.institution}])
    };

    window[callbackName] = function(response) {
      if(response.ok) alert("🎉 Success! " + response.msg);
      else alert("❌ Error: " + response.msg);
      document.body.removeChild(script);
      delete window[callbackName];
    };

    script.src = `${GAS_URL}?callback=${callbackName}&function=${params.function}&args=${encodeURIComponent(params.args)}`;
    document.body.appendChild(script);
  }
</script>
</body>
</html>

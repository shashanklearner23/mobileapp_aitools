<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Tool Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.06);
            --primary: #8b5cf6; /* Vivid Violet */
            --secondary: #06b6d4; /* Cyan */
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.15) 0%, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow: hidden;
        }

        /* Container for mobile responsiveness */
        .app-container {
            width: 100%;
            padding: 20px;
            max-width: 450px;
            perspective: 1000px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desc {
            text-align: center;
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.5);
            transition: 0.3s;
        }

        .main-btn:active {
            transform: scale(0.96);
        }

        .toggle-text {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .toggle-text span {
            color: var(--secondary);
            font-weight: 600;
            cursor: pointer;
            padding-left: 5px;
        }

        /* Animations */
        .hidden {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="glass-card fade-in" id="loginView">
            <h1>Nexus AI</h1>
            <p class="desc">Enter your credentials to begin</p>
            
            <div class="input-box">
                <input type="text" placeholder="Username" id="loginUser">
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" id="loginPass">
            </div>
            
            <button class="main-btn" onclick="handleLogin()">AUTHENTICATE</button>
            
            <p class="toggle-text">New user? <span onclick="showSignup()">Create Account</span></p>
        </div>

        <div class="glass-card fade-in hidden" id="signupView">
            <h1>Create Identity</h1>
            <p class="desc">Register for the AI Tool Catalog</p>
            
            <div class="input-box">
                <input type="text" placeholder="Full Name">
            </div>
            <div class="input-box">
                <input type="text" placeholder="College Name">
            </div>
            <div class="input-box">
                <input type="tel" placeholder="Phone Number">
            </div>
            <div class="input-box">
                <input type="password" placeholder="Set Password">
            </div>
            
            <button class="main-btn" onclick="handleSignup()">INITIALIZE</button>
            
            <p class="toggle-text">Joined already? <span onclick="showLogin()">Log In</span></p>
        </div>
    </div>

    <script>
        const loginView = document.getElementById('loginView');
        const signupView = document.getElementById('signupView');

        function showSignup() {
            loginView.classList.add('hidden');
            signupView.classList.remove('hidden');
        }

        function showLogin() {
            signupView.classList.add('hidden');
            loginView.classList.remove('hidden');
        }

        function handleLogin() {
            const user = document.getElementById('loginUser').value;
            if(user) {
                alert('Access Granted. Redirecting to AI Tools...');
                // You would navigate to your tools catalog here
                // window.location.href = "tools.html";
            } else {
                alert('Please enter your credentials');
            }
        }

        function handleSignup() {
            alert('Identity Created! You can now log in.');
            showLogin();
        }
    </script>
</body>
</html>
